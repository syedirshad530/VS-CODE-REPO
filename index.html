<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to AWS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #232f3e; /* AWS Dark Blue */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            color: #232f3e;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-top: 5px solid #ff9900; /* AWS Orange */
        }
        h1 { margin-bottom: 10px; }
        p { color: #545b64; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff9900;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn:hover { background-color: #ec7211; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to AWS</h1>
        <h2>AWS DOCUMENTATION..........</h2>
        <h3>Best cloud in market...</h3>
        <p>Your static website is now running on the cloud.</p>
        <a href="https://aws.amazon.com/getting-started/" class="btn">Explore Documentation</a>
    </div>
</body>
</html>
